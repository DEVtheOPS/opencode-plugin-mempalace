name: Bug report
description: Report something that is not working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: "When I..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      value: |
        1. Configure OpenCode with '@devtheops/opencode-plugin-mempalace'
        2. Run '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      description: What version of @devtheops/opencode-plugin-mempalace are you using?
      placeholder: "0.2.0"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Your relevant OpenCode config, command invocation, or environment details (redact sensitive values)
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs (redact sensitive values)
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this has not been reported
          required: true
        - label: I have redacted any sensitive information
          required: true
